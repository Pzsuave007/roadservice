# ============================================
# Ben's Road Service LLC - Docker Deployment
# ============================================
# Run with: docker-compose up -d
# ============================================

version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: bens-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - bens-network
    environment:
      - MONGO_INITDB_DATABASE=bens_road_service

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bens-backend
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=bens_road_service
    networks:
      - bens-network

  # Frontend (React/Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL:-http://localhost}
    container_name: bens-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - bens-network

networks:
  bens-network:
    driver: bridge

volumes:
  mongodb_data:
